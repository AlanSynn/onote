# Dependabot тАФ keeps Cargo dependencies and GitHub Actions up to date. A
# local-first CLI shipping `rusqlite`/`axum`/`image`/`ratatui-image` benefits
# from timely notices when security-relevant transitive crates release fixes.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    # `notify` 8 and `ratatui-image` 11 are major bumps that need real migration
    # work (notify split into `notify` + `notify-types`, moving `RecursiveMode`;
    # ratatui-image 11 changed its build script / native-dep surface). They are
    # deferred to a dedicated upgrade тАФ v0.1.x ships on the stable notify 7 and
    # ratatui-image 6. Minor/patch updates for these crates still flow through.
    ignore:
      - dependency-name: "notify"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ratatui-image"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
