# Continuous Integration for onote.
#
# This workflow mirrors the local `just ci` gate (fmt-check + clippy + tests)
# so the two never drift: what passes locally passes in CI, and vice versa.
# `cargo clippy ... -- -D warnings` is intentional — warnings are treated as
# errors to keep the tree clean. Linux is verified alongside macOS because the
# project is macOS-developed but built on cross-platform crates (comrak,
# ratatui, notify, rusqlite, axum, git CLI) that must not silently regress on
# Linux. Windows is intentionally not a v0.1 target.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all
