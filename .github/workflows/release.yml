# Release build — triggered by pushing a `v*` tag (e.g. `v0.2.1`). Builds
# optimized native binaries for all primary targets and attaches them to the
# GitHub Release. `install.sh` downloads the matching prebuilt binary where one
# exists (x86_64 Linux musl), else builds from source. LTO + strip come from
# [profile.release].
#
# Shape: a `build` job matrix runs the same gate as `ci.yml` (test + clippy)
# BEFORE building, so a tag on a red SHA never ships artifacts. Each matrix leg
# uploads its archive (`.tar.gz` on Unix, `.zip` on Windows) as a workflow
# artifact; a `linux-portable` job adds a STATIC musl binary + a `.deb`
# (apt-format, no runtime deps); a single `release` job
# (`needs: [build, linux-portable]`) downloads them all and attaches them to the
# GitHub Release in one upload — no concurrent-upload race.
# Targets: macOS arm64 + x86_64 (the latter cross-compiled from Apple Silicon),
# Linux x86_64 (gnu + portable musl + .deb), Windows x86_64 (MSVC).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read    # least-privilege default; only the `release` job escalates

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-14                 # cross-compile Intel from Apple Silicon (macos-13/Intel runners are deprecated)
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest           # Linux arm64 prebuilt (RPi / arm servers / arm CI runners)
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      # Gate: refuse to build a release binary on a commit that fails the same
      # checks CI enforces. `--all`, `-D warnings`, and `--locked` mirror
      # .github/workflows/ci.yml (`--locked` pins Cargo.lock so a release never
      # silently picks up a drifted dependency).
      - name: Gate (clippy + tests)
        run: |
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage + archive
        shell: bash
        run: |
          mkdir -p staging
          EXE=""
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then EXE=".exe"; fi
          cp "target/${{ matrix.target }}/release/onote${EXE}" "staging/onote${EXE}"
          # Ship install.sh alongside Unix archives so a downloaded tarball is
          # self-installing. The Windows zip has no shell installer.
          if [ "${{ matrix.archive }}" != "zip" ]; then
            cp install.sh staging/ 2>/dev/null || true
            tar -czf "onote-${{ matrix.target }}.tar.gz" -C staging .
          else
            ( cd staging && 7z a "../onote-${{ matrix.target }}.zip" "onote${EXE}" >/dev/null )
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: onote-${{ matrix.target }}
          path: onote-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 7

  # Portable Linux: one musl build feeds BOTH the portable `.tar.gz` (a static
  # binary any distro can run) and the `.deb` (apt-format, `dpkg -i` / Software
  # Center, no runtime deps). Separate from the `build` matrix so the musl
  # toolchain install + cargo-deb don't pollute the other legs.
  linux-portable:
    name: Linux portable (musl + .deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install musl toolchain + cargo-deb
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          cargo install cargo-deb --locked

      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-musl-deb

      - name: Build static musl binary
        env:
          # rusqlite's bundled SQLite compiles C; point cc-rs at the musl gcc.
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Stage + archive (portable tarball)
        run: |
          mkdir -p staging
          cp target/x86_64-unknown-linux-musl/release/onote staging/
          cp install.sh staging/ 2>/dev/null || true
          tar -czf onote-x86_64-unknown-linux-musl.tar.gz -C staging .

      - name: Build .deb (wraps the static binary; no runtime deps)
        run: cargo deb --target x86_64-unknown-linux-musl --no-build --output onote-x86_64-linux.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: onote-linux-portable
          path: |
            onote-x86_64-unknown-linux-musl.tar.gz
            onote-x86_64-linux.deb
          retention-days: 7

  release:
    name: Attach to GitHub Release
    runs-on: ubuntu-latest
    needs: [build, linux-portable]
    permissions:
      contents: write      # attach assets to the GitHub Release
      id-token: write      # OIDC for sigstore signing (build provenance)
      attestations: write  # publish build-provenance attestations
    steps:
      - name: Checkout (for install.sh + provenance)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download all build artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: assets
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: assets/*

      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: assets/*
          fail_on_unmatched_files: true

  # Bump the Homebrew formula + Scoop manifest to the just-released version, so
  # `brew install onote` / `scoop install onote` track each `v*` tag without a
  # manual edit. Runs AFTER `release` (assets are attached) and pushes to TWO
  # OTHER repos (AlanSynn/homebrew-tap, AlanSynn/scoop), so it authenticates
  # with the TAP_GITHUB_TOKEN secret (a PAT the maintainer creates — the default
  # GITHUB_TOKEN cannot push cross-repo). See CONTRIBUTING.md "Releases" for setup.
  # If the secret is unset, the job warns and skips instead of failing the release.
  bump-taps:
    name: Bump Homebrew + Scoop taps
    runs-on: ubuntu-latest
    needs: [release]
    env:
      TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - name: Resolve version
        id: v
        run: |
          TAG="${GITHUB_REF_NAME}"        # v0.2.1
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"   # 0.2.1

      - name: Guard — skip if no tap token
        id: guard
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::TAP_GITHUB_TOKEN secret is not set; skipping tap auto-bump. See CONTRIBUTING.md 'Releases'."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Hash the prebuilt release assets the taps install directly: both macOS
      # (arm64 + x86_64) tarballs for the Homebrew formula, and the Windows .zip
      # for Scoop. No source archive — every install surface is prebuilt, so the
      # formula points at these binaries, not a source tarball.
      - name: Hash prebuilt assets (darwin arm/intel + Windows)
        if: steps.guard.outputs.skip != 'true'
        id: sha
        env:
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          ARM_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/onote-aarch64-apple-darwin.tar.gz"
          INTEL_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/onote-x86_64-apple-darwin.tar.gz"
          WIN_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/onote-x86_64-pc-windows-msvc.zip"
          ARM_SHA=$(curl -fsSL "$ARM_URL" | sha256sum | cut -d' ' -f1)
          INTEL_SHA=$(curl -fsSL "$INTEL_URL" | sha256sum | cut -d' ' -f1)
          WIN_SHA=$(curl -fsSL "$WIN_URL" | sha256sum | cut -d' ' -f1)
          test -n "$ARM_SHA"   || { echo "darwin arm64 tarball hash empty"; exit 1; }
          test -n "$INTEL_SHA" || { echo "darwin x86_64 tarball hash empty"; exit 1; }
          test -n "$WIN_SHA"   || { echo "windows zip hash empty"; exit 1; }
          echo "arm=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "intel=$INTEL_SHA" >> "$GITHUB_OUTPUT"
          echo "win=$WIN_SHA" >> "$GITHUB_OUTPUT"

      - name: Bump homebrew-tap (Formula/onote.rb)
        if: steps.guard.outputs.skip != 'true'
        env:
          TAG: ${{ steps.v.outputs.tag }}
          VERSION: ${{ steps.v.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm }}
          INTEL_SHA: ${{ steps.sha.outputs.intel }}
        run: |
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/AlanSynn/homebrew-tap.git" tap
          cd tap
          export REPO="https://github.com/AlanSynn/onote"
          # Regenerate the whole formula from a prebuilt-binary template — no
          # regex on a prior file, so the move from source-build to prebuilt (and
          # any future structural change) is robust. Installs the darwin binary
          # directly (`bin.install`); no Rust toolchain, no `cargo install`.
          python3 - <<'PY'
          import pathlib, os, textwrap
          tag, ver = os.environ["TAG"], os.environ["VERSION"]
          repo = os.environ["REPO"]
          arm, intel = os.environ["ARM_SHA"], os.environ["INTEL_SHA"]
          # `{{bin}}` escapes to literal `{bin}` — Ruby interpolation, NOT a
          # Python placeholder. textwrap.dedent strips the YAML-indent common
          # prefix so the formula lands at column 0 despite this block's indent.
          tmpl = f'''\
          class Onote < Formula
            desc "Terminal-native, Obsidian-compatible Markdown vault client"
            homepage "{repo}"
            version "{ver}"
            license "MIT"

            on_macos do
              on_arm do
                url "{repo}/releases/download/{tag}/onote-aarch64-apple-darwin.tar.gz"
                sha256 "{arm}"
              end
              on_intel do
                url "{repo}/releases/download/{tag}/onote-x86_64-apple-darwin.tar.gz"
                sha256 "{intel}"
              end
            end

            def install
              bin.install "onote"
            end

            test do
              assert_match "onote", shell_output("#{{bin}}/onote --version")
            end
          end
          '''
          pathlib.Path("Formula/onote.rb").write_text(textwrap.dedent(tmpl))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/onote.rb
          if git diff --cached --quiet; then
            echo "homebrew-tap already at ${TAG}; no commit."
          else
            git commit -m "onote ${TAG#v}: bump prebuilt darwin binaries + sha256"
            git push
            echo "homebrew-tap bumped to ${TAG} (prebuilt)"
          fi

      - name: Bump scoop bucket (bucket/onote.json)
        if: steps.guard.outputs.skip != 'true'
        env:
          TAG: ${{ steps.v.outputs.tag }}
          VERSION: ${{ steps.v.outputs.version }}
          WIN_SHA: ${{ steps.sha.outputs.win }}
        run: |
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/AlanSynn/scoop.git" scoop
          cd scoop
          export WIN_URL="https://github.com/AlanSynn/onote/releases/download/${TAG}/onote-x86_64-pc-windows-msvc.zip"
          python3 - <<PY
          import re, pathlib, os
          f = pathlib.Path("bucket/onote.json")
          s = f.read_text()
          ver, url, h = (os.environ[k] for k in ("VERSION","WIN_URL","WIN_SHA"))
          s = re.sub(r'("version"\s*:\s*")[^"]+"', rf'\g<1>{ver}"', s, count=1)
          s = re.sub(r'("url"\s*:\s*")[^"]+/releases/download/[^"]+onote-x86_64-pc-windows-msvc\.zip"',
                     rf'\g<1>{url}"', s, count=1)
          s = re.sub(r'("hash"\s*:\s*")[0-9a-f]{64}"', rf'\g<1>{h}"', s, count=1)
          # The autoupdate block carries a templated $version url; leave it.
          f.write_text(s)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/onote.json
          if git diff --cached --quiet; then
            echo "scoop bucket already at ${TAG}; no commit."
          else
            git commit -m "onote ${VERSION}: bump version + windows hash"
            git push
            echo "scoop bucket bumped to ${TAG}"
          fi
